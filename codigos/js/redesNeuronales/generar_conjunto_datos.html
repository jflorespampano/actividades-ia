<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <style>
        body{
            display: block;
        }
        .fila {
            display: flex;
            gap: 20px;          /* Espacio entre columnas */
            justify-content: space-between; /* Distribución uniforme */
            padding: 20px;
            background-color: #f5f5f5;
            border-radius: 8px;
        }

        .columna {
            flex: 1;            /* Reparte el espacio equitativamente */
            background-color: white;
            padding: 20px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            /* text-align: center; */
            border: 1px solid #ddd;
        }


        #div_imagen{
            display:inline-block;
            border:1px solid grey;
        }
        #div_imagen>mi_imagen{
            display:block;
        }
        #titulo{
            border:1px solid grey;
            padding: 2px;
        }
        #mi_grafica{
            float:left;
            padding-right: 5px;
        }
        #mi_div{
            float:left;  
            border:1px solid grey;
            padding-left: 3px;
        }
        #canvas{
            border:1px solid grey; 
            float:left; 
            margin: 10;
            background: #D3D3D3;
        }
        input{
            display: block; 
        }
        td{
            text-align: right;
        }
        td.verde{
            color: green;
        }
        td.azul{
            color: blue;
        }
        .boton{
            text-decoration: none;
            padding: 5px;
            font-weight: 600;
            font-size: 15px;
            color: #ffffff;
            background-color: #1883ba;
            border-radius: 6px;
            border: 2px solid #0016b0;
        }
        #customers {
            font-family: "Trebuchet MS", Arial, Helvetica, sans-serif;
            border-collapse: collapse;
            /*width: 100%;*/
        }

        #customers td, #customers th {
            border: 1px solid #ddd;
            padding: 8px;
        }

        #customers tr:nth-child(even){background-color: #f2f2f2;}

        #customers tr:hover {background-color: #ddd;}

        #customers th {
            padding-top: 12px;
            padding-bottom: 12px;
            text-align: left;
            background-color: #4CAF50;
            color: white;
        }
        p{
            font-family: "Trebuchet MS", Arial, Helvetica, sans-serif;
            font-size: 14px;
            border: 1px solid grey;
        }
    </style>
    
</head>
<body>
    <div id="principal" class="fila">
        <div id="div_trabajo">
            <p id="titulo">Para agregar puntos (x,y, clase), indique la clase (0/1) y haga clic en el área gráfica, repita hasta completar su conjunto de puntos.
            </p>
            <div id="mi_grafica" class="columna">
                <canvas id="canvas" width="600" height="400"></canvas>
            </div>
            <div id="mi_div" class="columna">
                <label for='miId'>area gráfica -50, 50</label>
                <label for='miId'>dame x</label>
                <input type='number' id='x' placeholder='x'><br>
                <label for='miId'>dame y</label>
                <input type='number' id='y' placeholder='y'><br>
                <label for='miId'>dame clase (0,1)</label>
                <input type='number' id='clase' placeholder='clase' min="0" max="1" value="0"><br>
                <input type="button" id="llena_tabla" class="boton" value="llena tabla" ><br>
                <input type="button" id="btn_salida" class="boton" value="muestra arreglo" >
                <br>
                <div style="overflow:scroll;height:200px;width:200px;">
                    <table id="customers">
                        <caption>Tabla datos</caption>
                        <thead>
                            <tr>
                                <td>x1</td><td>x2</td><td>clase</td>
                            </tr>
                        </thead>
                        <tbody id="datos_tabla">   
                        </tbody>
                    </table>
                </div>
                
            </div>
        </div>
        <div id="div_salida" class="columna">
            <p>Salida</p>
            <p id="salida"></p>
            <p id="salida2"></p>
            <div>
                <p id="salida3"></p>
                <input type="button" id="copiarSalida" class="boton" value="copiar salida" onclick="copyToClipboard()">
            </div>
        </div>
        
    </div>
</body>
<script>
    let area_grafica={
        "alto_canvas":0,
        "ancho_canvas":0,
        "alto_grafica":0,
        "ancho_grafica":0,
        "minx":0,
        "miny":0,
        "maxx":0,
        "maxy":0,
        "padding":5
    };
    //puntos a graficar
    var puntos=[
        
    ];
    var vec_salida=[];
    function pon_punto(ctx, objeto, radio, color1, color2){
        ctx.save();
        ctx.strokeStyle=color1;
        ctx.fillStyle=color2;
        ctx.beginPath();
        let py=objeto.y;
        let px=objeto.x;
        ctx.arc(px, py, radio, 0, 2*Math.PI);
        if(color2) {ctx.fill()} else {ctx.stroke()};
        ctx.stroke();
        ctx.restore();
    }
    function ponCentro(){
        ctx.save();
        let texto="(0,0)";
        ctx.beginPath();
        let px=area_grafica.ancho_canvas/2;
        let py=area_grafica.alto_canvas/2;
        //
        ctx.strokeText(texto,px-23,py+10);
        ctx.strokeText("-50",0,py+10);
        ctx.strokeText("50",area_grafica.ancho_canvas-5,py+10);
        ctx.strokeText("50",px-9,10);
        ctx.strokeText("-50",px-12,area_grafica.alto_canvas);
        //
        ctx.moveTo(px,0);
        ctx.lineTo(px,area_grafica.alto_canvas)
        ctx.stroke()
        ctx.moveTo(0,py);
        ctx.lineTo(area_grafica.ancho_canvas,py)
        ctx.stroke();
        ctx.restore();
    }
    function llena_tabla(){
        let s="";
        puntos.forEach(x=>{
            s+="<tr><td>"+x.x+"</td><td>"+x.y+"</td><td>"+x.clase+"</td></tr>";
        });
        document.getElementById("datos_tabla").innerHTML=s;
        
    }
    
    function calcula_area_grafica(){
        area_grafica.maxx = 50;
        area_grafica.maxy = 50;
        area_grafica.minx = -50;
        area_grafica.miny = -50;
        area_grafica.ancho_grafica=area_grafica.maxx-area_grafica.minx;
        area_grafica.alto_grafica=area_grafica.maxy-area_grafica.miny;
    }
    
    function copyToClipboard() {
        const result = document.getElementById("salida3").textContent;
        console.log("Result=",result);
        alert("Result="+result);
        const textToCopy = result;

        navigator.clipboard.writeText(textToCopy).then(() => {
            alert('¡Copiado al portapapeles!');
        }).catch(err => {
            console.error('Error al copiar: ', err);
            alert('No se pudo copiar. Revisa la consola.');
        });
    }

    window.onload=function(){
        c1=document.getElementById("canvas");
        ctx=c1.getContext("2d");
        canvas.addEventListener('mousedown', function(evt) {
            function getMousePos(canvas, evt) {
                let ClientRect = canvas.getBoundingClientRect();
                return {
                    x: Math.round(evt.clientX - ClientRect.left),
                    y: Math.round(evt.clientY - ClientRect.top)
                };
            }
            function escala(objeto){
                //poner a escala
                let punto={"x": 0, "y": 0, "clase": 1};
                let ClientRect = canvas.getBoundingClientRect();
                let py=objeto.y*100/evt.clientY;
                let px=objeto.x*100/evt.clientX;
                punto.x=Math.round(px);
                punto.y=Math.round(py);
                punto.y=evt.clientY-punto.y;
                return punto;
            }
            let punto={"x": 0, "y": 0, "clase": 1};
            let mousePos = getMousePos(canvas, evt);
            const padding = 5
            punto.x=mousePos.x-(300)+padding;

            punto.y=200-mousePos.y-padding;
            let claseValue=document.getElementById("clase").value
            punto.clase=claseValue==1?1:-1
            const puntoConEscala = escala(punto);
            puntos.push(punto)
            // puntos.push(puntoConEscala)
            color=(punto.clase==1)?"blue":"green";
            let radio=5;
            pon_punto(ctx, mousePos, radio, "red", color);
            console.log('escala p : ' + punto.x + ',' + punto.y);
            console.log('escala pc: ' + puntoConEscala.x + ',' + puntoConEscala.y);
            
        }, false);

        function convertData(data) {
            const x = data.map(item => [item.x, item.y]);
            const y = data.map(item => item.clase === -1 ? 0 : (item.clase === 1 ? 1 : item.clase));
            return { x, y };
        }

        function convertDataToString(data) {
            const x = data.map(item => [item.x, item.y]);
            const y = data.map(item => item.clase === -1 ? 0 : (item.clase === 1 ? 1 : item.clase));
            const xStr = 'x=[' + x.map(pair => '[' + pair.join(',') + ']').join(',') + ']';
            const yStr = 'y=[' + y.join(',') + ']';
            return xStr + ';\n' + yStr;
        }

        document.getElementById("llena_tabla").addEventListener("click",function(){
            llena_tabla();

        });
        document.getElementById("btn_salida").addEventListener("click", function(){
            document.getElementById("salida").innerText=JSON.stringify(puntos);   
            document.getElementById("salida2").innerText=JSON.stringify(convertData(puntos));
            document.getElementById("salida3").innerText=convertDataToString(puntos);
            
        })
        //dimensiones del canvas
        area_grafica.alto_canvas=ctx.canvas.clientHeight-10;
        area_grafica.ancho_canvas=ctx.canvas.clientWidth-10;
        //obtener valores máximos x e y
        calcula_area_grafica();
        ponCentro();
    }
</script>
</html>
