<script>
    const data = [
        { x: 1, y: 2 },
        { x: 2, y: 3 },
        { x: 3, y: 5 },
        { x: 4, y: 7 },
        { x: 5, y: 11 }
    ];

    const series = ['series'];

    const surface = { name: 'Scatter Plot', tab: 'Charts' };

    tfvis.render.scatterplot(surface, { values: data, series }, {
        xLabel: 'X Axis',
        yLabel: 'Y Axis',
        height: 300
    });
</script>
